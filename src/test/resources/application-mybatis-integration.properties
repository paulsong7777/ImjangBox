spring.datasource.url=jdbc:h2:mem:imjangbox_mybatis_integration;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=never
spring.flyway.locations=classpath:db/mybatis-integration
mybatis.mapper-locations=classpath:mappers/*.xml
