spring.application.name=imjangbox
spring.profiles.default=local
mybatis.mapper-locations=classpath:mappers/*.xml
imjangbox.file-storage.local-root=${java.io.tmpdir}/imjangbox-local-files
imjangbox.geocoding.kakao.enabled=false
imjangbox.geocoding.kakao.rest-api-key=${KAKAO_REST_API_KEY:}
imjangbox.geocoding.kakao.base-url=https://dapi.kakao.com
imjangbox.maps.kakao.enabled=false
imjangbox.maps.kakao.javascript-api-key=${KAKAO_MAP_JAVASCRIPT_KEY:}
imjangbox.maps.kakao.sdk-base-url=https://dapi.kakao.com/v2/maps/sdk.js
imjangbox.maps.kakao.default-latitude=37.566500
imjangbox.maps.kakao.default-longitude=126.978000
imjangbox.maps.kakao.default-level=4
