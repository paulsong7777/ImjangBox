<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>임장박스</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" title="Bootstrap 5.3">
</head>
<body class="bg-light">
<main class="container py-4 py-md-5">
	<section class="py-md-4">
		<p class="text-primary fw-semibold mb-2">상가 중개 현장 장부</p>
		<h1 class="display-6 fw-semibold mb-3">임장박스</h1>
		<p class="lead mb-4">
			상가 전문 공인중개사가 내 매물을 지도와 카드로 한눈에 관리하고,
			사진과 가격 조건이 담긴 고객 제안 카드로 쉽게 공유하는 도구입니다.
		</p>
		<div class="d-grid d-sm-flex gap-2 mb-4">
			<a class="btn btn-primary btn-lg" href="/broker/inspections">상가 매물 관리 시작하기</a>
			<a class="btn btn-outline-secondary btn-lg" href="/broker/inspections/new">상가 매물 등록하기</a>
		</div>
	</section>

	<section id="flow" class="row g-3">
		<div class="col-md-4">
			<div class="bg-white border rounded p-3 h-100">
				<h2 class="h5">1. 내 매물 한눈에 보기</h2>
				<p class="text-body-secondary mb-0">등록한 상가를 지도와 카드에서 바로 찾고 상태를 확인합니다.</p>
			</div>
		</div>
		<div class="col-md-4">
			<div class="bg-white border rounded p-3 h-100">
				<h2 class="h5">2. 사진과 조건 관리</h2>
				<p class="text-body-secondary mb-0">주소, 보증금, 월세, 권리금, 면적, 사진과 내부 메모를 정리합니다.</p>
			</div>
		</div>
		<div class="col-md-4">
			<div class="bg-white border rounded p-3 h-100">
				<h2 class="h5">3. 고객 제안 카드</h2>
				<p class="text-body-secondary mb-0">고객에게 보여도 되는 위치, 조건, 시설 정보만 제안 카드로 만듭니다.</p>
			</div>
		</div>
	</section>
</main>
</body>
</html>
