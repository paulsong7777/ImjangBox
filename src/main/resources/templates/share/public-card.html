<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${snapshot.title}">고객 제안 카드</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" title="Bootstrap 5.3">
	<style>
		.proposal-photo-placeholder {
			background: linear-gradient(135deg, #f8f9fa, #e9ecef);
		}
		.price-box {
			background-color: #f8f9fa;
			border: 1px solid #e9ecef;
			border-radius: .5rem;
			padding: 1rem;
			height: 100%;
		}
	</style>
</head>
<body class="bg-light">
<main class="container py-3 py-md-4">
	<section class="bg-white border rounded overflow-hidden mb-3">
		<div class="ratio ratio-16x9 proposal-photo-placeholder d-flex align-items-center justify-content-center">
			<img th:if="${!#lists.isEmpty(snapshot.images)}"
					class="img-fluid w-100 h-100 object-fit-cover"
					th:src="${snapshot.images[0].imageUrl}"
					th:alt="${snapshot.images[0].altText}">
			<div th:if="${#lists.isEmpty(snapshot.images)}" class="text-center text-body-secondary px-3">
				<p class="fw-semibold mb-1">대표 사진 준비 전</p>
				<p class="small mb-0">중개사를 통해 현장 사진을 추가로 확인해 주세요.</p>
			</div>
		</div>
		<div class="p-3 p-md-4">
			<p class="text-primary fw-semibold mb-2">고객 제안 카드</p>
			<div class="row g-3 align-items-end">
				<div class="col-12 col-lg-8">
					<h1 class="h3 mb-2" th:text="${snapshot.title}">상가 매물</h1>
					<p class="text-body-secondary mb-0" th:text="${snapshot.publicAddress.summary}">고객 공유용 위치</p>
				</div>
				<div class="col-12 col-lg-4">
					<div class="border rounded p-3 bg-light">
						<div class="small text-body-secondary">제안 위치</div>
						<div class="fw-semibold" th:text="${snapshot.publicAddress.summary}">공개 주소</div>
						<div class="small text-body-secondary mt-1"
								th:if="${snapshot.publicAddress.landmarkHint != null and !snapshot.publicAddress.landmarkHint.isBlank()}"
								th:text="${snapshot.publicAddress.landmarkHint}">위치 힌트</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section class="bg-white border rounded p-3 p-md-4 mb-3">
		<div class="d-flex flex-column flex-md-row justify-content-md-between gap-2 mb-3">
			<div>
				<p class="text-primary fw-semibold small mb-1">제안 조건</p>
				<h2 class="h5 mb-0">임대 조건</h2>
			</div>
			<p class="text-body-secondary small mb-0">금액 단위: 만원</p>
		</div>
		<div class="row g-3">
			<div class="col-12 col-md-4">
				<div class="price-box">
					<div class="text-body-secondary small">보증금</div>
					<div class="fs-5 fw-semibold">
						<span th:text="${#numbers.formatInteger(snapshot.pricing.depositAmount, 0, 'COMMA')}">0</span><span class="small text-body-secondary">만원</span>
					</div>
				</div>
			</div>
			<div class="col-12 col-md-4">
				<div class="price-box">
					<div class="text-body-secondary small">월세</div>
					<div class="fs-5 fw-semibold">
						<span th:text="${#numbers.formatInteger(snapshot.pricing.monthlyRentAmount, 0, 'COMMA')}">0</span><span class="small text-body-secondary">만원</span>
					</div>
				</div>
			</div>
			<div class="col-12 col-md-4">
				<div class="price-box">
					<div class="text-body-secondary small">권리금</div>
					<div class="fs-5 fw-semibold">
						<span th:text="${#numbers.formatInteger(snapshot.pricing.premiumAmount, 0, 'COMMA')}">0</span><span class="small text-body-secondary">만원</span>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section class="bg-white border rounded p-3 p-md-4 mb-3">
		<h2 class="h5 mb-3">이 매물의 핵심 정보</h2>
		<dl class="row mb-0">
			<dt class="col-sm-3">위치</dt>
			<dd class="col-sm-9" th:text="${snapshot.publicAddress.summary}">고객 공유용 위치</dd>
			<dt class="col-sm-3" th:if="${snapshot.publicAddress.landmarkHint != null and !snapshot.publicAddress.landmarkHint.isBlank()}">위치 힌트</dt>
			<dd class="col-sm-9" th:if="${snapshot.publicAddress.landmarkHint != null and !snapshot.publicAddress.landmarkHint.isBlank()}"
					th:text="${snapshot.publicAddress.landmarkHint}">랜드마크</dd>
			<dt class="col-sm-3">정보 확인</dt>
			<dd class="col-sm-9"
					th:text="${snapshot.verificationDisplayText}">정보 확인</dd>
		</dl>
	</section>

	<section class="bg-white border rounded p-3 p-md-4 mb-3" th:if="${!#lists.isEmpty(snapshot.facilities)}">
		<h2 class="h5 mb-3">시설 확인</h2>
		<div class="d-flex flex-wrap gap-2">
			<span class="badge rounded-pill text-bg-light border text-body p-2"
					th:each="facility : ${snapshot.facilities}">
				<span th:text="${facility.label}">시설 항목</span>
				<span class="fw-semibold" th:text="${facility.answer == 'OK' ? '양호' :
						(facility.answer == 'NEEDS_CHECK' ? '추가 확인' :
						(facility.answer == 'NOT_APPLICABLE' ? '해당 없음' :
						(facility.answer == '' ? '미확인' : facility.answer)))}">확인 결과</span>
			</span>
		</div>
	</section>

	<section class="bg-white border rounded p-3 p-md-4 mb-3" th:if="${!#lists.isEmpty(snapshot.images)}">
		<h2 class="h5 mb-3">현장 사진</h2>
		<div class="row g-3">
			<div class="col-sm-6 col-lg-4" th:each="image : ${snapshot.images}">
				<div class="ratio ratio-4x3 bg-light border rounded overflow-hidden">
					<img class="img-fluid w-100 h-100 object-fit-cover" th:src="${image.imageUrl}" th:alt="${image.altText}">
				</div>
			</div>
		</div>
	</section>

	<section class="alert alert-secondary mb-0">
		본 고객 제안 카드는 공개 가능한 정보만 정리한 안내용 요약입니다. 세부 조건과 계약 가능 여부는 중개사를 통해 다시 확인해 주세요.
	</section>
</main>
</body>
</html>
