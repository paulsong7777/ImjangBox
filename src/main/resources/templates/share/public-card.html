<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${snapshot.title}">Share card</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" title="Bootstrap 5.3">
</head>
<body class="bg-light">
<main class="container py-4">
	<section class="bg-white border rounded p-4 mb-4">
		<p class="text-body-secondary mb-2">고객 공유 카드</p>
		<h1 class="h3 mb-3" th:text="${snapshot.title}">Property title</h1>
		<div class="d-flex flex-wrap gap-2">
			<span class="badge text-bg-primary" th:text="${snapshot.verificationDisplayText}">Verification status</span>
			<span class="badge text-bg-secondary" th:text="${snapshot.publicAddress.summary}">District</span>
		</div>
	</section>

	<section class="bg-white border rounded p-4 mb-4">
		<h2 class="h5 mb-3">공개 위치</h2>
		<dl class="row mb-0">
			<dt class="col-sm-3">주소 요약</dt>
			<dd class="col-sm-9" th:text="${snapshot.publicAddress.summary}">District</dd>
			<dt class="col-sm-3">랜드마크</dt>
			<dd class="col-sm-9" th:text="${snapshot.publicAddress.landmarkHint ?: '-'}">Landmark</dd>
		</dl>
	</section>

	<section class="bg-white border rounded p-4 mb-4">
		<h2 class="h5 mb-3">공개 가격</h2>
		<div class="row g-3">
			<div class="col-md-4">
				<div class="text-body-secondary small">보증금</div>
				<div class="fs-5" th:text="${#numbers.formatInteger(snapshot.pricing.depositAmount, 0, 'COMMA')}">0</div>
			</div>
			<div class="col-md-4">
				<div class="text-body-secondary small">월세</div>
				<div class="fs-5" th:text="${#numbers.formatInteger(snapshot.pricing.monthlyRentAmount, 0, 'COMMA')}">0</div>
			</div>
			<div class="col-md-4">
				<div class="text-body-secondary small">권리금</div>
				<div class="fs-5" th:text="${#numbers.formatInteger(snapshot.pricing.premiumAmount, 0, 'COMMA')}">0</div>
			</div>
		</div>
	</section>

	<section class="bg-white border rounded p-4 mb-4" th:if="${!#lists.isEmpty(snapshot.facilities)}">
		<h2 class="h5 mb-3">시설 요약</h2>
		<ul class="list-group list-group-flush">
			<li class="list-group-item px-0 d-flex justify-content-between gap-3"
					th:each="facility : ${snapshot.facilities}">
				<span th:text="${facility.label}">Facility</span>
				<strong th:text="${facility.answer}">OK</strong>
			</li>
		</ul>
	</section>

	<section class="bg-white border rounded p-4" th:if="${!#lists.isEmpty(snapshot.images)}">
		<h2 class="h5 mb-3">공개 이미지</h2>
		<div class="row g-3">
			<div class="col-sm-6 col-lg-4" th:each="image : ${snapshot.images}">
				<div class="ratio ratio-4x3 bg-light border rounded d-flex align-items-center justify-content-center">
					<img class="img-fluid rounded" th:src="${image.imageUrl}" th:alt="${image.altText}">
				</div>
			</div>
		</div>
	</section>
</main>
</body>
</html>
