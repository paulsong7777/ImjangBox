<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>imjangbox broker inspection</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" title="Bootstrap 5.3">
</head>
<body>
<main class="container py-4">
	<h1 class="h3 mb-4">브로커 현장 점검 기록</h1>
	<form th:action="@{${formAction}}" th:object="${inspectionForm}" method="post" enctype="multipart/form-data">
		<div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">입력값을 확인해 주세요.</div>
		<div class="alert alert-danger" th:if="${attachmentError}" th:text="${attachmentError}">첨부 파일 오류</div>
		<section class="mb-4">
			<h2 class="h5">상가 기본 정보</h2>
			<label class="form-label" for="title">제목</label>
			<input class="form-control" id="title" th:field="*{title}">
			<label class="form-label mt-3" for="areaSquareMeters">전용 면적(㎡)</label>
			<input class="form-control" id="areaSquareMeters" th:field="*{areaSquareMeters}">
		</section>
		<section class="mb-4">
			<h2 class="h5">주소</h2>
			<label class="form-label" for="internalRoadAddress">내부 주소</label>
			<input class="form-control" id="internalRoadAddress" th:field="*{internalRoadAddress}">
			<label class="form-label mt-3" for="internalDetailAddress">내부 상세 주소</label>
			<input class="form-control" id="internalDetailAddress" th:field="*{internalDetailAddress}">
			<label class="form-label mt-3" for="publicAddressSummary">공개 주소 요약</label>
			<input class="form-control" id="publicAddressSummary" th:field="*{publicAddressSummary}">
			<label class="form-label mt-3" for="publicLandmarkHint">공개 랜드마크 힌트</label>
			<input class="form-control" id="publicLandmarkHint" th:field="*{publicLandmarkHint}">
			<label class="form-label mt-3" for="internalGeocodeMemo">내부 지오코딩 메모</label>
			<textarea class="form-control" id="internalGeocodeMemo" th:field="*{internalGeocodeMemo}"></textarea>
		</section>
		<section class="mb-4">
			<h2 class="h5">가격과 상태</h2>
			<label class="form-label" for="depositAmount">보증금</label>
			<input class="form-control" id="depositAmount" type="number" min="0" th:field="*{depositAmount}">
			<label class="form-label mt-3" for="monthlyRentAmount">월세</label>
			<input class="form-control" id="monthlyRentAmount" type="number" min="0" th:field="*{monthlyRentAmount}">
			<label class="form-label mt-3" for="premiumAmount">권리금</label>
			<input class="form-control" id="premiumAmount" type="number" min="0" th:field="*{premiumAmount}">
			<label class="form-label mt-3" for="verificationStatus">확인 상태</label>
			<select class="form-select" id="verificationStatus" th:field="*{verificationStatus}">
				<option th:each="status : ${verificationStatuses}" th:value="${status}" th:text="${status}"></option>
			</select>
			<label class="form-label mt-3" for="businessFitMemo">업종 적합 메모</label>
			<textarea class="form-control" id="businessFitMemo" th:field="*{businessFitMemo}"></textarea>
			<label class="form-label mt-3" for="conditionMemo">시설/상태 메모</label>
			<textarea class="form-control" id="conditionMemo" th:field="*{conditionMemo}"></textarea>
		</section>
		<section class="mb-4">
			<h2 class="h5">내부 전용 기록</h2>
			<label class="form-label" for="pricePrivateNote">가격 비공개 메모</label>
			<textarea class="form-control" id="pricePrivateNote" th:field="*{pricePrivateNote}"></textarea>
			<label class="form-label mt-3" for="privateMemo">비공개 메모</label>
			<textarea class="form-control" id="privateMemo" th:field="*{privateMemo}"></textarea>
			<label class="form-label mt-3" for="internalRiskMemo">내부 리스크 메모</label>
			<textarea class="form-control" id="internalRiskMemo" th:field="*{internalRiskMemo}"></textarea>
		</section>
		<section class="mb-4">
			<h2 class="h5">연락 기록</h2>
			<label class="form-label" for="contactedOn">연락일</label>
			<input class="form-control" id="contactedOn" type="date" th:field="*{contactedOn}">
			<label class="form-label mt-3" for="contactLogContent">연락 내용</label>
			<textarea class="form-control" id="contactLogContent" th:field="*{contactLogContent}"></textarea>
		</section>
		<section class="mb-4">
			<h2 class="h5">첨부 파일</h2>
			<input class="form-control" type="file" id="attachments" name="attachments" multiple>
		</section>
		<button class="btn btn-primary" type="submit" th:text="${submitLabel}">저장</button>
	</form>
</main>
</body>
</html>
